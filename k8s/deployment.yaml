# Pik Dame - Kubernetes Deployment
#
# IMPORTANT: replicas MUST stay 1. Game sessions live in process memory and
# the accounts DB is a local SQLite file on the PVC - the server is
# deliberately a single-instance stateful app. "strategy: Recreate" prevents
# two pods from ever writing to the same volume during an update; the
# session snapshot + restore mechanism bridges the short restart gap.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pikdame
  labels:
    app: pikdame
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pikdame
  template:
    metadata:
      labels:
        app: pikdame
    spec:
      # Mirror of the OWASP hardening used in docker-compose
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: pikdame
          image: ghcr.io/floriandeutsch89/pikdame-local:latest # pin :vX.Y.Z in production
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: PIKDAME_MAX_SESSIONS
              value: "200"
            # Secrets (SMTP, base URL) via a Secret - see k8s/README.md:
            # envFrom:
            #   - secretRef:
            #       name: pikdame-env
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pikdame-data
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
