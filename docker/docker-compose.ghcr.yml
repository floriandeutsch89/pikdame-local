# Pik Dame - run with the prebuilt image from GHCR (no local build).
# Start:   docker compose -f docker-compose.ghcr.yml up -d
# Update:  docker compose -f docker-compose.ghcr.yml pull && docker compose -f docker-compose.ghcr.yml up -d
#
# NOTE: GHCR packages start out PRIVATE. Either set the package to "public"
# in the GitHub package settings, or log in first:
#   echo $GITHUB_TOKEN | docker login ghcr.io -u <username> --password-stdin

services:
  pikdame:
    image: ghcr.io/floriandeutsch89/pikdame-local:latest
    container_name: pikdame
    restart: unless-stopped
    # Give the graceful shutdown (session snapshot + store flush) time to
    # finish before Docker sends SIGKILL (default would be 10s).
    stop_grace_period: 30s
    ports:
      - "8080:8080"
    # Secrets (SMTP password etc.) belong in an untracked .env file, not in
    # this committed file - copy .env.example to .env and uncomment:
    # env_file:
    #   - .env
    environment:
      - PORT=8080
      # Account database: PostgreSQL (shared, networked - the prerequisite
      # for ever scaling beyond one app instance). Without this URL the
      # server falls back to zero-config SQLite in data/users.db.
      - PIKDAME_DATABASE_URL=postgres://pikdame:${POSTGRES_PASSWORD:-change-me}@postgres:5432/pikdame
      - PIKDAME_MAX_SESSIONS=200
      # - PIKDAME_BASE_URL=https://spiel.pikdame.online
      # - PIKDAME_SMTP_HOST=smtp.example.com
      # - PIKDAME_SMTP_PORT=587
      # - PIKDAME_SMTP_SECURE=starttls
      # - PIKDAME_SMTP_USER=noreply@pikdame.online
      # - PIKDAME_SMTP_PASS=secret
      # - PIKDAME_MAIL_FROM=Pik Dame <noreply@pikdame.online>
    volumes:
      - pikdame-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # OWASP RULE #6: process cap (fork-bomb guard); belongs in the
          # deploy block - a sibling 'pids_limit' is rejected.
          pids: 256
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # OWASP hardening - kept in sync with docker-compose.yml (see SECURITY.md)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    ulimits:
      nofile:
        soft: 4096
        hard: 4096

  postgres:
    image: postgres:18-alpine
    container_name: pikdame-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=pikdame
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - POSTGRES_DB=pikdame
    volumes:
      # postgres:18 image: mount point is /var/lib/postgresql (PGDATA lives
      # in a versioned subdirectory to ease future pg_upgrade)
      - pikdame-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pikdame -d pikdame"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Not exposed to the host on purpose - only the app container reaches it.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

volumes:
  pikdame-data:
  pikdame-pgdata:
