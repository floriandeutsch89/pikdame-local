# Pik Dame - production stack: Caddy (TLS/ACME) -> app -> PostgreSQL.
#
#   cd docker
#   cp .env.example .env                     # domain, ACME e-mail, non-secrets
#   echo -n 'strong-password' > secrets/db_password.txt
#   echo -n 'smtp-password'   > secrets/smtp_password.txt   # optional
#   docker compose -f docker-compose.prod.yml up -d
#
# Secrets policy: real secrets live as compose FILE SECRETS (mounted at
# /run/secrets, never visible in `docker inspect`/environment); .env only
# carries non-sensitive configuration. See https://pik-dame.readthedocs.io/en/latest/admin/operations.html
#
# Network layout (least privilege):
#   caddy_egress   - internet-facing (ACME, future CrowdSec plugins)
#   caddy_pikdame  - internal: Caddy <-> app only
#   pikdame        - internal: app <-> PostgreSQL only
# The app has NO route to the internet. NOTE: that also blocks outbound
# SMTP - to send confirmation mails either attach the app to an egress
# network as well, or run a mail relay inside the internal network.

services:
  caddy:
    # Custom build: official Caddy + CrowdSec bouncer plugin (xcaddy).
    # ALTERNATIVE: pull the prebuilt package instead of building on the server -
    # then Watchtower keeps the proxy patched like the app (each release is
    # rebuilt on the latest caddy:2-alpine base). To switch, comment the
    # 'build:' line and use:
    #   image: ghcr.io/floriandeutsch89/pikdame-local-caddy:latest
    build: ./caddy
    image: pikdame-caddy:latest
    container_name: pikdame-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PIKDAME_DOMAIN=${PIKDAME_DOMAIN:?set PIKDAME_DOMAIN in .env}
      - ACME_EMAIL=${ACME_EMAIL:?set ACME_EMAIL in .env}
      # Created once via: docker compose exec crowdsec cscli bouncers add caddy-bouncer
      - CROWDSEC_API_KEY=${CROWDSEC_API_KEY:?run cscli bouncers add and set CROWDSEC_API_KEY in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # certificates - MUST persist
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    depends_on:
      - crowdsec
    networks:
      - caddy_egress
      - caddy_pikdame
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  pikdame:
    image: ghcr.io/floriandeutsch89/pikdame-local:latest # pin :vX.Y.Z in production
    # --- Trained ONNX bots (optional) ---------------------------------------
    # To run the TRAINED bot policies, switch to the second published image -
    # runtime and models are baked in, PIKDAME_ONNX=1 is preset:
    #
    #   image: ghcr.io/floriandeutsch89/pikdame-local-onnx:v1.63.0
    #
    # Separate image because onnxruntime-node needs glibc (the default image is
    # Alpine/musl). Same UID/GID (10001), so the existing data volume and the
    # secret file permissions keep working.
    #
    # NOTE for this stack: Watchtower auto-updates by TAG. If you pin a version
    # (recommended in production), pin the ONNX tag the same way - and remember
    # that switching image also switches the update stream.
    #
    # Verify after deploy:
    #   docker compose logs pikdame | grep -i "ONNX-Modell"
    # Details: docs/admin/onnx.md
    container_name: pikdame
    restart: unless-stopped
    stop_grace_period: 30s
    # No published ports - only Caddy reaches the app.
    environment:
      - PORT=8080
      - PIKDAME_MAX_SESSIONS=200
      - PIKDAME_TRUST_PROXY=1
      - PIKDAME_ALLOWED_ORIGIN=https://${PIKDAME_DOMAIN:?set PIKDAME_DOMAIN in .env}
      - PIKDAME_BASE_URL=https://${PIKDAME_DOMAIN}
      # Secret-free URL - the password is injected from the secret file.
      - PIKDAME_DATABASE_URL=postgres://pikdame@postgres:5432/pikdame
      - PIKDAME_DATABASE_PASSWORD_FILE=/run/secrets/db_password
      # SMTP through the egress proxy (the app has no internet route; the
      # proxy can only reach Mailgun EU:587). TLS is verified against the
      # real mail server name, not the proxy hostname.
      - PIKDAME_SMTP_HOST=smtp-egress
      - PIKDAME_SMTP_PORT=587
      - PIKDAME_SMTP_SECURE=starttls
      - PIKDAME_SMTP_TLS_SERVERNAME=smtp.eu.mailgun.org
      - PIKDAME_SMTP_USER=${PIKDAME_SMTP_USER:-}
      - PIKDAME_SMTP_PASS_FILE=/run/secrets/smtp_password
      - PIKDAME_MAIL_FROM=${PIKDAME_MAIL_FROM:-}
    secrets:
      - db_password
      - smtp_password
    volumes:
      - pikdame-data:/app/data
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - caddy_pikdame
      - pikdame
      - pikdame_smtp
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          pids: 256
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    ulimits:
      nofile:
        soft: 4096
        hard: 4096

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: pikdame-crowdsec
    restart: unless-stopped
    environment:
      # Parsers + scenarios for Caddy access logs and common HTTP attacks
      - COLLECTIONS=crowdsecurity/caddy crowdsecurity/http-cve
    volumes:
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - crowdsec-data:/var/lib/crowdsec/data
      - crowdsec-config:/etc/crowdsec
      - caddy-logs:/var/log/caddy:ro
    networks:
      # Internet for hub/scenario updates; Caddy reaches the LAPI here too.
      - caddy_egress
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # SMTP egress proxy: the ONLY path from the app towards the internet, and
  # it can only reach ONE destination (Mailgun EU, port 587). The app itself
  # stays on internal networks without any route to the outside.
  smtp-egress:
    image: alpine/socat:latest
    container_name: pikdame-smtp-egress
    restart: unless-stopped
    command: tcp-listen:587,fork,reuseaddr tcp-connect:smtp.eu.mailgun.org:587
    networks:
      - pikdame_smtp
      - caddy_egress
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true
    read_only: true

  # Auto-updates for the stack: Watchtower polls the registry daily at 04:00
  # and recreates opted-in containers (label below) with the new image.
  # Keep it label-scoped: the custom-built Caddy image cannot be pulled.
  # NOTE: nickfedor/watchtower is the actively maintained drop-in fork -
  # the original containrrr image ships a Docker client (API 1.25) that
  # Docker Engine >= 29 rejects (min API 1.44), causing a crash loop.
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: pikdame-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - caddy_egress
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:18-alpine
    container_name: pikdame-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=pikdame
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_DB=pikdame
    secrets:
      - db_password
    volumes:
      # postgres:18 image: mount point is /var/lib/postgresql (PGDATA lives
      # in a versioned subdirectory to ease future pg_upgrade)
      - pikdame-pgdata:/var/lib/postgresql
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - pikdame
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pikdame -d pikdame"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

# File secrets are bind mounts and keep the HOST file's owner and mode.
# The app runs as UID 10001 (non-root) - the files must be readable for it:
#   chown 10001:10001 secrets/*.txt && chmod 400 secrets/*.txt
# (postgres reads its secret as root during init, so it is unaffected)
secrets:
  db_password:
    file: ./secrets/db_password.txt
  smtp_password:
    file: ./secrets/smtp_password.txt

networks:
  # Internet-facing (ACME today; attach CrowdSec bouncer/plugins here later)
  caddy_egress:
  # Proxy path only - no internet route
  caddy_pikdame:
    internal: true
  # App <-> database only - no internet route
  pikdame:
    internal: true
  # App <-> SMTP egress proxy only - no internet route for the app itself
  pikdame_smtp:
    internal: true

volumes:
  pikdame-data:
  pikdame-pgdata:
  caddy-data:
  caddy-config:
  caddy-logs:
  crowdsec-data:
  crowdsec-config:
