name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Real PostgreSQL for the account-store integration tests (they skip
    # automatically when PIKDAME_TEST_PG_URL is absent, e.g. locally)
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pikdame
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: pikdame_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pikdame -d pikdame_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      PIKDAME_TEST_PG_URL: postgres://pikdame:testpass@127.0.0.1:5432/pikdame_test
    steps:
      - uses: actions/checkout@v4
      # Single current LTS line (24) - identical to the Docker image, so the
      # account tests (node:sqlite, available since Node 22) always run for real.
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm ci
      # Exactly the same tests as locally: npm test = node --test test/*.test.js
      - run: npm test
      # Consistency: the Dockerfile must use the same Node major version
      - name: Node version Dockerfile == CI
        run: grep -q "FROM node:24" docker/Dockerfile || (echo "Dockerfile Node version differs from CI (24)" && exit 1)

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm ci
      # Outdated packages fail the job (the project deliberately has only
      # 'ws' - updating is a one-line chore instead of a surprise)
      - name: Outdated packages
        run: npm outdated
      # Known vulnerabilities (severity high and above)
      - name: Security audit
        run: npm audit --audit-level=high

  docker-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # OWASP RULE #11: lint the Dockerfile.
      # DL3018 (apk version pins) is ignored on purpose: tini should track
      # the Alpine base image instead of being pinned to one version.
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          ignore: DL3018
      - name: Build image
        run: docker build -f docker/Dockerfile -t pikdame:scan .
      # OWASP RULE #8: scan the image for known vulnerabilities.
      # ignore-unfixed: Alpine CVEs without an available fix do not block.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pikdame:scan
          format: json
          output: trivy.json
          exit-code: '0'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Evaluate findings (as annotations)
        run: |
          COUNT=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy.json)
          jq -r '.Results[]?.Vulnerabilities[]? | "::error::\(.VulnerabilityID) in \(.PkgName) \(.InstalledVersion) -> fix: \(.FixedVersion // "-") [\(.Severity)]"' trivy.json | head -20
          echo "Fixable HIGH/CRITICAL findings: $COUNT"
          [ "$COUNT" = "0" ]

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Proves the server runs under the FULL OWASP hardening:
      # cap_drop ALL, read_only, AppArmor profile (Ubuntu runners have
      # AppArmor enabled), pids limit, tmpfs - up, healthy, responding.
      # Granular steps: a failing step name reveals the cause.
      - name: Validate compose file
        run: |
          if ! ERR=$(docker compose -f docker/docker-compose.yml config 2>&1 > /dev/null); then
            echo "::error::compose config: ${ERR}"
            exit 1
          fi
      - name: Validate prod compose (Caddy + secrets + networks)
        run: |
          cd docker
          cp .env.example .env
          echo test-password > secrets/db_password.txt
          echo test-smtp > secrets/smtp_password.txt
          if ! ERR=$(docker compose -f docker-compose.prod.yml config 2>&1 > /dev/null); then
            echo "::error::prod compose config: ${ERR}"
            exit 1
          fi
      - name: Build image
        run: docker compose -f docker/docker-compose.yml build
      - name: Compose up (hardened configuration)
        run: docker compose -f docker/docker-compose.yml up -d
      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' pikdame 2>/dev/null || echo starting)
            echo "Health: $STATUS"
            [ "$STATUS" = "healthy" ] && exit 0
            [ "$STATUS" = "unhealthy" ] && docker logs pikdame && exit 1
            sleep 2
          done
          echo "Timeout"; docker logs pikdame; exit 1
      - name: Check endpoints
        run: |
          curl -fsS http://localhost:8080/healthz
          curl -fsS http://localhost:8080/statusz | grep -o '"status":"ok"'
      - name: Verify effective hardening
        run: |
          docker inspect pikdame --format 'ReadonlyRootfs={{.HostConfig.ReadonlyRootfs}} CapDrop={{.HostConfig.CapDrop}} Pids={{.HostConfig.PidsLimit}} SecurityOpt={{.HostConfig.SecurityOpt}}'
          docker inspect pikdame --format '{{.HostConfig.ReadonlyRootfs}}' | grep -q true
      - name: Clean up
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # helm is preinstalled on ubuntu runners
      - name: Helm lint
        run: helm lint helm/pikdame
      - name: Render templates (defaults + variations)
        run: |
          helm template test helm/pikdame > /dev/null
          helm template test helm/pikdame --set ingress.tls.enabled=true > /dev/null
          helm template test helm/pikdame --set persistence.existingClaim=my-claim --set existingSecret=pikdame-env > /dev/null
          echo "All variations render."
