name: Release

# On every push to main: if the version in package.json has no git tag yet,
# the workflow automatically creates:
# 1. Git tag vX.Y.Z + GitHub release (notes = matching CHANGELOG section)
# 2. Docker image on GHCR: ghcr.io/<owner>/pikdame-local:latest + :vX.Y.Z
#    (amd64 + arm64 - also runs on Raspberry Pi & Apple Silicon)
# 3. The Caddy reverse-proxy image (ghcr.io/<owner>/pikdame-local-caddy) -
#    but only rebuilt when the recipe or a Caddy base image actually changed;
#    otherwise the existing image is simply retagged for the new version.
# 4. A SECOND image with the trained ONNX bots baked in:
#    ghcr.io/<owner>/pikdame-local-onnx:latest + :vX.Y.Z
#    (Debian/glibc base - onnxruntime-node cannot run on the Alpine/musl image)

on:
  push:
    branches: [main]

permissions:
  contents: write # create tag + release
  packages: write # GHCR push

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_new: ${{ steps.v.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        name: Read version + check whether the tag already exists
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists - no new release."
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "New version: v$VERSION"
          fi

  release:
    needs: meta
    if: needs.meta.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          # Cut the "## [X.Y.Z]" section up to the next "## ["
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { on=1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." > release-notes.md
          fi
          echo "--- Notes for v$VERSION ---"; cat release-notes.md
      - name: Create tag + GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          gh release create "v$VERSION" \
            --title "Pik Dame v$VERSION" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}"

  helm-chart:
    needs: [meta, release]
    if: needs.meta.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package chart (version = app version)
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          helm package helm/pikdame --version "$VERSION" --app-version "$VERSION"
      - name: Push chart to GHCR (OCI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          echo "$GH_TOKEN" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "pikdame-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"

  docker-onnx:
    # Second image: same app, but on a DEBIAN (glibc) base with onnxruntime-node
    # and the trained models baked in. It cannot share the default Alpine image:
    # onnxruntime-node ships glibc-linked native binaries that do not load on
    # musl. Published as its own package so the default image stays small.
    #
    # Deliberately a SEPARATE job: it is the slow one (a ~100 MB native
    # dependency), and if it ever fails it must not take the main image down
    # with it.
    needs: [meta, release]
    if: needs.meta.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ONNX image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.onnx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-onnx:latest
            ghcr.io/${{ github.repository }}-onnx:v${{ needs.meta.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=onnx
          cache-to: type=gha,mode=max,scope=onnx

  docker-caddy:
    # Third image: the reverse proxy - official Caddy with the CrowdSec bouncer
    # plugin compiled in via xcaddy (plugins cannot be loaded at runtime).
    #
    # This build is SLOW (xcaddy compiles Go, and arm64 runs under QEMU), while
    # the recipe changes almost never. But we must NOT simply skip it when
    # docker/caddy/** is untouched: most of the value is picking up patched
    # caddy:2-alpine BASE images for a binary that faces the open internet.
    #
    # So we rebuild exactly when something actually changed - checked against
    # the image we already published:
    #   * the recipe (hash over docker/caddy/**), or
    #   * the digest of either base image upstream.
    # If nothing changed, we skip the build and just RETAG the existing image
    # with the new version (a manifest operation, seconds), so :vX.Y.Z still
    # exists for every release and the prod compose keeps working.
    needs: [meta, release]
    if: needs.meta.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide - rebuild or retag?
        id: gate
        run: |
          set -uo pipefail
          IMAGE="ghcr.io/${{ github.repository }}-caddy"

          # Fingerprint of the build recipe (every file in docker/caddy).
          RECIPE=$(find docker/caddy -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -d" " -f1)

          # Current upstream base digests (manifest-list digest = arch-independent).
          BUILDER=$(docker buildx imagetools inspect caddy:2-builder-alpine --format "{{.Manifest.Digest}}" 2>/dev/null || echo "unknown")
          RUNTIME=$(docker buildx imagetools inspect caddy:2-alpine --format "{{.Manifest.Digest}}" 2>/dev/null || echo "unknown")
          echo "recipe=$RECIPE" >> "$GITHUB_OUTPUT"
          echo "builder=$BUILDER" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME" >> "$GITHUB_OUTPUT"

          # What did we bake into the published image last time? (Labels; the
          # image may not exist yet on the very first run -> then we build.)
          PREV=$(docker buildx imagetools inspect "$IMAGE:latest" --format "{{json .Image}}" 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            echo "No published image yet -> build."
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Multi-arch: .Image is a map platform -> config. Any platform will do,
          # the labels are identical across them.
          P_RECIPE=$(echo "$PREV" | jq -r "[.. | objects | .config? // empty | .Labels? // empty | .\"online.pikdame.caddy.recipe\"? // empty] | first // \"\"")
          P_BUILDER=$(echo "$PREV" | jq -r "[.. | objects | .config? // empty | .Labels? // empty | .\"online.pikdame.caddy.base.builder\"? // empty] | first // \"\"")
          P_RUNTIME=$(echo "$PREV" | jq -r "[.. | objects | .config? // empty | .Labels? // empty | .\"online.pikdame.caddy.base.runtime\"? // empty] | first // \"\"")

          echo "recipe : $P_RECIPE -> $RECIPE"
          echo "builder: $P_BUILDER -> $BUILDER"
          echo "runtime: $P_RUNTIME -> $RUNTIME"

          # Unknown upstream digests must never be treated as "unchanged".
          if [ "$BUILDER" = "unknown" ] || [ "$RUNTIME" = "unknown" ]; then
            echo "Could not read upstream digests -> build to be safe."
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          elif [ "$P_RECIPE" = "$RECIPE" ] && [ "$P_BUILDER" = "$BUILDER" ] && [ "$P_RUNTIME" = "$RUNTIME" ]; then
            echo "Recipe and both base images unchanged -> retag only."
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          else
            echo "Something changed -> rebuild."
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push Caddy image (amd64 + arm64)
        if: steps.gate.outputs.rebuild == 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker/caddy
          file: docker/caddy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-caddy:latest
            ghcr.io/${{ github.repository }}-caddy:v${{ needs.meta.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            online.pikdame.caddy.recipe=${{ steps.gate.outputs.recipe }}
            online.pikdame.caddy.base.builder=${{ steps.gate.outputs.builder }}
            online.pikdame.caddy.base.runtime=${{ steps.gate.outputs.runtime }}
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

      - name: Retag existing image for this release (nothing changed)
        if: steps.gate.outputs.rebuild == 'false'
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository }}-caddy"
          docker buildx imagetools create \
            -t "$IMAGE:v${{ needs.meta.outputs.version }}" \
            "$IMAGE:latest"
          echo "Reused the published image (no Caddy or base-image change)."

  docker:
    needs: [meta, release]
    if: needs.meta.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:v${{ needs.meta.outputs.version }}
          # OCI labels: make version + commit traceable on the registry
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
