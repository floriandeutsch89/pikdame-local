name: Release

# On every push to main: if the version in package.json has no git tag yet,
# the workflow automatically creates:
# 1. Git tag vX.Y.Z + GitHub release (notes = matching CHANGELOG section)
# 2. Docker image on GHCR: ghcr.io/<owner>/pikdame-local:latest + :vX.Y.Z
#    (amd64 + arm64 - also runs on Raspberry Pi & Apple Silicon)

on:
  push:
    branches: [main]

permissions:
  contents: write # create tag + release
  packages: write # GHCR push

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_new: ${{ steps.v.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        name: Read version + check whether the tag already exists
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists - no new release."
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "New version: v$VERSION"
          fi

  release:
    needs: meta
    if: needs.meta.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          # Cut the "## [X.Y.Z]" section up to the next "## ["
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { on=1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." > release-notes.md
          fi
          echo "--- Notes for v$VERSION ---"; cat release-notes.md
      - name: Create tag + GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          gh release create "v$VERSION" \
            --title "Pik Dame v$VERSION" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}"

  helm-chart:
    needs: [meta, release]
    if: needs.meta.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package chart (version = app version)
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          helm package helm/pikdame --version "$VERSION" --app-version "$VERSION"
      - name: Push chart to GHCR (OCI)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          echo "$GH_TOKEN" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "pikdame-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"

  docker:
    needs: [meta, release]
    if: needs.meta.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:v${{ needs.meta.outputs.version }}
          # OCI labels: make version + commit traceable on the registry
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
