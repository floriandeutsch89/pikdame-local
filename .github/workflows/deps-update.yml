# Weekly dependency updates (user request):
#   - every Monday 03:00 UTC: check for outdated npm packages
#   - if any: update to latest, bump MINOR version, add a German changelog
#     line, open a PR and request @floriandeutsch89 as reviewer
#   - if the PR's CI goes fully green: AUTO-MERGE (squash) - chore updates
#     do not need a human review ("Don't need to check chore updates")
#   - if CI fails or times out: the PR stays open with the reviewer set,
#     so a human only ever looks at the broken cases
#
# Uses the WORKFLOW_PAT repo secret (a fine-grained PAT) instead of
# GITHUB_TOKEN on purpose: PRs created by GITHUB_TOKEN do not trigger CI
# workflows, and merges by GITHUB_TOKEN do not trigger the release
# workflow. If the PAT expires, refresh the WORKFLOW_PAT secret.
name: deps-update
on:
  schedule:
    - cron: '0 3 * * 1' # Monday 03:00 UTC
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        run: npm ci
      - name: Check for outdated packages
        id: outdated
        run: |
          set -e
          npm outdated --json > /tmp/outdated.json || true
          # npm outdated exits 1 when something is outdated - the file is the truth
          if [ ! -s /tmp/outdated.json ] || [ "$(cat /tmp/outdated.json)" = "{}" ]; then
            echo "none=true" >> "$GITHUB_OUTPUT"
            echo "All dependencies are current - nothing to do."
          else
            echo "none=false" >> "$GITHUB_OUTPUT"
            LIST=$(node -e "const o=require('/tmp/outdated.json'); console.log(Object.entries(o).map(([n,i])=>\`\${n} \${i.current}→\${i.latest}\`).join(', '))")
            echo "list=$LIST" >> "$GITHUB_OUTPUT"
            echo "Outdated: $LIST"
          fi
      - name: Update packages
        if: steps.outdated.outputs.none == 'false'
        run: |
          npx --yes npm-check-updates -u --target latest
          npm install
      - name: Bump minor version + changelog line
        if: steps.outdated.outputs.none == 'false'
        id: bump
        run: |
          NEW_VERSION=$(node scripts/bump-deps.js "${{ steps.outdated.outputs.list }}")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
      - name: Create branch + PR (reviewer notified)
        if: steps.outdated.outputs.none == 'false'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          set -e
          BRANCH="chore/deps-$(date +%Y%m%d)"
          git config user.name "pikdame-deps-bot"
          git config user.email "deps-bot@pikdame.local"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(deps): weekly dependency update to latest (v${{ steps.bump.outputs.version }})

          ${{ steps.outdated.outputs.list }}

          Auto-generated by deps-update.yml. Will auto-merge if CI is green;
          otherwise it waits for the requested reviewer."
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(deps): weekly dependency update (v${{ steps.bump.outputs.version }})" \
            --body "Automated weekly update: ${{ steps.outdated.outputs.list }}

          **Auto-merge:** this PR merges itself once ALL checks are green (chore updates need no review per repo policy). If CI fails it stays open for the reviewer." \
            --base main --head "$BRANCH"
          gh pr edit "$BRANCH" --add-reviewer floriandeutsch89 || echo "reviewer request failed (non-fatal)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Wait for CI and auto-merge when green
        if: steps.outdated.outputs.none == 'false'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          set -e
          SHA="${{ steps.pr.outputs.sha }}"
          BRANCH="${{ steps.pr.outputs.branch }}"
          # Poll up to 20 minutes. The just-pushed SHA may briefly show zero
          # check runs - treat that as "queued", not as success.
          for i in $(seq 1 40); do
            sleep 30
            RESULT=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}/check-runs" --jq '
              if (.check_runs | length) == 0 then "queued"
              elif ([.check_runs[] | select(.status != "completed")] | length) > 0 then "running"
              elif ([.check_runs[] | select(.conclusion != null and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length) > 0 then "failed"
              else "green" end')
            echo "poll $i: $RESULT"
            if [ "$RESULT" = "green" ]; then
              gh pr merge "$BRANCH" --squash --delete-branch
              echo "Auto-merged - the release workflow takes over from main."
              exit 0
            fi
            if [ "$RESULT" = "failed" ]; then
              gh pr comment "$BRANCH" --body "❌ CI ist nicht grün - dieses Dependency-Update braucht einen menschlichen Blick. Der PR bleibt offen."
              echo "CI failed - PR left open for the reviewer."
              exit 0
            fi
          done
          gh pr comment "$BRANCH" --body "⏳ CI hat nach 20 Minuten kein Ergebnis - bitte manuell prüfen. Der PR bleibt offen."
          echo "Timed out waiting for CI - PR left open."
