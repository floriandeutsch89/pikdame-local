{{- /*
  Guardrail: enabling ONNX while still pointing at the DEFAULT (Alpine) image
  produces a server that silently falls back to the heuristic bots -
  onnxruntime-node's native binaries are glibc-linked and cannot load on musl.
  That is a configuration mistake worth failing on, not shipping.
*/ -}}
{{- if and .Values.onnx.enabled (eq .Values.image.repository "ghcr.io/floriandeutsch89/pikdame-local") }}
{{- fail "onnx.enabled=true requires the ONNX image: set image.repository=ghcr.io/floriandeutsch89/pikdame-local-onnx (the default Alpine image cannot run onnxruntime-node). See docs/admin/onnx.md" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pikdame.name" . }}
  labels:
    {{- include "pikdame.labels" . | nindent 4 }}
spec:
  # Single instance by design - see values.yaml (replicaCount) for the why.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pikdame.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pikdame.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: pikdame
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: PIKDAME_MAX_SESSIONS
              value: {{ .Values.env.maxSessions | quote }}
            {{- if .Values.onnx.enabled }}
            - name: PIKDAME_ONNX
              value: "1"
            {{- end }}
            {{- if .Values.database.existingSecret }}
            - name: PIKDAME_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey }}
            {{- else if .Values.database.url }}
            - name: PIKDAME_DATABASE_URL
              value: {{ .Values.database.url | quote }}
            {{- end }}
          {{- if .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "pikdame.name" .)) }}
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
