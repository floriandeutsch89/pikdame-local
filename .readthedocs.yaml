# Read the Docs build configuration.
# Docs live in docs/ inside the main repo, so they stay in sync with the code.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt

formats:
  - pdf
  - epub
