services:
  pikdame:
    build: .
    image: pikdame:latest
    container_name: pikdame
    restart: unless-stopped
    # Give the graceful shutdown (session snapshot + store flush) time to
    # finish before Docker sends SIGKILL (default would be 10s).
    stop_grace_period: 30s
    ports:
      - "8080:8080"
    # Secrets (SMTP password etc.) belong in an untracked .env file, not in
    # this committed file - copy .env.example to .env and uncomment:
    # env_file:
    #   - .env
    environment:
      - PORT=8080
      # Upper bound for parallel game sessions (DoS/memory guard, default 200)
      - PIKDAME_MAX_SESSIONS=200
      # --- User accounts (registration + login) ---
      # Accounts are active automatically (SQLite in data/users.db, Node 24).
      # To disable: PIKDAME_ACCOUNTS=0
      # Base URL for the confirmation links in the e-mails:
      # - PIKDAME_BASE_URL=https://spiel.pikdame.online
      # --- Mail server (add later - until then the confirmation link is
      #     written to the server log) ---
      # - PIKDAME_SMTP_HOST=smtp.example.com
      # - PIKDAME_SMTP_PORT=587
      # - PIKDAME_SMTP_SECURE=starttls   # starttls | ssl | none
      # - PIKDAME_SMTP_USER=noreply@pikdame.online
      # - PIKDAME_SMTP_PASS=secret
      # - PIKDAME_MAIL_FROM=Pik Dame <noreply@pikdame.online>
    volumes:
      # Player profiles / game history / accounts DB survive container restarts and updates.
      - pikdame-data:/app/data
    # --- Best practices: resources, log rotation, hardening ---
    deploy:
      resources:
        limits:
          # OWASP RULE #6: process cap (fork-bomb guard). With a deploy
          # block present this belongs HERE - a sibling 'pids_limit' is
          # rejected by docker compose as contradictory.
          pids: 256
          # Measured: ~117 KB heap per active game + Node base load.
          # 512M carries the 200-session cap with plenty of headroom;
          # 1 CPU is enough (the server is I/O-bound, not CPU-bound).
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # --- OWASP Docker Security (container rules) ---
    # RULE #3: drop all Linux capabilities - the Node server only binds
    # port 8080 (unprivileged) and needs none at all.
    cap_drop:
      - ALL
    # RULE #4 (no-new-privileges) + explicit AppArmor default profile.
    # Note: apparmor applies on hosts WITH AppArmor (Ubuntu/Debian) - on
    # SELinux hosts (Fedora/RHEL) comment out that single line.
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    # RULE #7: immutable root filesystem; writable are ONLY the data/
    # volume and a small non-executable tmpfs for /tmp.
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    # RULE #6 (continued): file descriptors for WebSocket connections
    # (4096 carries hundreds of parallel clients).
    ulimits:
      nofile:
        soft: 4096
        hard: 4096

volumes:
  pikdame-data:
